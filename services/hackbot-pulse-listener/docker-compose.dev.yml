services:
  hackbot-pulse-listener:
    build:
      context: ../..
      dockerfile: services/hackbot-pulse-listener/Dockerfile
    # Inject config into the container (relative to this compose file = repo root .env).
    env_file: ../../.env
    # Live-edit the source without rebuilding (cwd takes precedence on sys.path).
    volumes:
      - ./app:/app/app
    command: python -m app
