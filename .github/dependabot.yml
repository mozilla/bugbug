version: 2
updates:
  - package-ecosystem: docker
    directories:
      - "/http_service"
      - "/infra"
      - "/services/*"
    schedule:
      interval: weekly
    groups:
      patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - patch
    open-pull-requests-limit: 99
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - patch
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 99
    allow:
      - dependency-type: direct
  - package-ecosystem: uv
    directory: "/services/mcp"
    schedule:
      interval: weekly
      day: tuesday
    groups:
      patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - patch
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 99
    allow:
      - dependency-type: direct
  - package-ecosystem: uv
    directory: "/services/reviewhelper-api"
    schedule:
      interval: weekly
      day: wednesday
    groups:
      patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - patch
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 99
    allow:
      - dependency-type: direct
  - package-ecosystem: npm
    directory: "/ui/changes"
    schedule:
      interval: weekly
    groups:
      patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - patch
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 99
  - package-ecosystem: pre-commit
    directory: "/"
    schedule:
      interval: weekly
    groups:
      patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - patch
    open-pull-requests-limit: 99
